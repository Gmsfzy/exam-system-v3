<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加题目 - 在线考试系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">在线考试系统</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">欢迎, {{ session.username }} (教师)</span>
                <a class="btn btn-outline-light" href="{{ url_for('logout') }}">退出</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">添加题目</h2>
            <div>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary me-2">返回仪表板</a>
                <button type="submit" form="add_question_form" class="btn btn-primary">添加题目</button>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="mb-4">
            <a href="{{ url_for('ai_generate') }}" class="btn btn-outline-primary">
                <i class="fas fa-sparkles"></i> 用 AI 一键生成题目
            </a>
        </div>

        <form method="POST" id="add_question_form">
            <div class="mb-3">
                <label for="question_text" class="form-label">题目内容</label>
                <div id="question_text_editor"></div>
                <textarea class="d-none" id="question_text_hidden" name="question_text"></textarea>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="question_type" class="form-label">题目类型</label>
                        <select class="form-control" id="question_type" name="question_type" required onchange="toggleQuestionFields()">
                            <option value="multiple_choice">单选题</option>
                            <option value="multiple_select">多选题</option>
                            <option value="true_false">判断题</option>
                            <option value="short_answer">简答题</option>
                            <option value="programming">编程题</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="points" class="form-label">分值</label>
                        <input type="number" class="form-control" id="points" name="points" value="1" min="1" required>
                    </div>
                </div>
            </div>

            <div id="options-section">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="option_a" class="form-label">选项A</label>
                            <input type="text" class="form-control" id="option_a" name="option_a">
                        </div>
                        <div class="mb-3">
                            <label for="option_b" class="form-label">选项B</label>
                            <input type="text" class="form-control" id="option_b" name="option_b">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="option_c" class="form-label">选项C</label>
                            <input type="text" class="form-control" id="option_c" name="option_c">
                        </div>
                        <div class="mb-3">
                            <label for="option_d" class="form-label">选项D</label>
                            <input type="text" class="form-control" id="option_d" name="option_d">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="option_e" class="form-label">选项E (可选)</label>
                            <input type="text" class="form-control" id="option_e" name="option_e">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="option_f" class="form-label">选项F (可选)</label>
                            <input type="text" class="form-control" id="option_f" name="option_f">
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-3" id="correct-answer-section">
                <label for="correct_answer" class="form-label">正确答案</label>
                <input type="text" class="form-control" id="correct_answer" name="correct_answer" placeholder="对于多选题，请用逗号分隔，如: A,B,C">
            </div>

            <!-- 编程题特有字段 -->
            <div class="mb-3" id="programming-section" style="display: none;">
                <label for="test_cases" class="form-label">测试用例 (JSON格式)</label>
                <textarea class="form-control" id="test_cases" name="test_cases" rows="6" placeholder='[
  {
    "input": "1 2",
    "expected_output": "3"
  },
  {
    "input": "5 7",
    "expected_output": "12"
  }
]'></textarea>

                <label for="solution_code" class="form-label mt-3">参考答案代码</label>
                <textarea class="form-control" id="solution_code" name="solution_code" rows="10" placeholder="# 在此处输入参考答案代码
def add_numbers(a, b):
    return a + b"></textarea>
            </div>

            <!-- 简答题参考答案 -->
            <div class="mb-3" id="short-answer-section" style="display: none;">
                <label for="short_answer_ref" class="form-label">参考答案</label>
                <textarea class="form-control" id="short_answer_ref" name="correct_answer" rows="5" placeholder="输入标准参考答案，包含得分要点"></textarea>
            </div>

            <!-- 题目解析 -->
            <div class="mb-3">
                <label for="explanation" class="form-label">题目解析 <span class="text-muted small">（可选，也可后续用 AI 生成）</span></label>
                <textarea class="form-control" id="explanation" name="explanation" rows="4" placeholder="输入题目解析，包括正确答案分析、知识点补充等"></textarea>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="subject" class="form-label">科目</label>
                        <input type="text" class="form-control" id="subject" name="subject" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="difficulty" class="form-label">难度</label>
                        <select class="form-control" id="difficulty" name="difficulty" required>
                            <option value="easy">简单</option>
                            <option value="medium">中等</option>
                            <option value="hard">困难</option>
                        </select>
                    </div>
                </div>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
    <script>
        // 初始化富文本编辑器
        $('#question_text_editor').summernote({
            height: 200,
            callbacks: {
                onChange: function(contents, $editable) {
                    $('#question_text_hidden').val(contents);
                }
            }
        });

        function toggleQuestionFields() {
            const questionType = document.getElementById('question_type').value;
            const optionsSection = document.getElementById('options-section');
            const correctAnswerSection = document.getElementById('correct-answer-section');
            const programmingSection = document.getElementById('programming-section');
            const shortAnswerSection = document.getElementById('short-answer-section');
            const correctAnswerInput = document.getElementById('correct_answer');

            if (['multiple_choice', 'multiple_select', 'true_false'].includes(questionType)) {
                optionsSection.style.display = 'block';
                programmingSection.style.display = 'none';
                shortAnswerSection.style.display = 'none';

                if (questionType === 'true_false') {
                    // 判断题特殊处理
                    document.getElementById('option_a').value = '正确';
                    document.getElementById('option_b').value = '错误';
                    document.getElementById('option_c').value = '';
                    document.getElementById('option_d').value = '';
                    document.getElementById('option_e').value = '';
                    document.getElementById('option_f').value = '';

                    correctAnswerInput.placeholder = '输入 A 或 B';
                } else {
                    // 恢复其他题型的占位符
                    document.getElementById('option_a').value = '';
                    document.getElementById('option_b').value = '';
                    document.getElementById('option_c').value = '';
                    document.getElementById('option_d').value = '';
                    document.getElementById('option_e').value = '';
                    document.getElementById('option_f').value = '';

                    if (questionType === 'multiple_select') {
                        correctAnswerInput.placeholder = '多选题：用逗号分隔，如 A,B,C';
                    } else {
                        correctAnswerInput.placeholder = '单选题：输入 A, B, C, D, E 或 F';
                    }
                }

                correctAnswerSection.style.display = 'block';
            } else if (questionType === 'programming') {
                // 编程题：隐藏选项，显示编程特定字段
                optionsSection.style.display = 'none';
                programmingSection.style.display = 'block';
                shortAnswerSection.style.display = 'none';
                correctAnswerSection.style.display = 'none';
            } else {
                // 简答题：隐藏选项，显示参考答案
                optionsSection.style.display = 'none';
                programmingSection.style.display = 'none';
                shortAnswerSection.style.display = 'block';
                correctAnswerSection.style.display = 'none';
            }
        }

        // 初始调用一次
        toggleQuestionFields();
    </script>
</body>
</html>
