<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建考试 - 在线考试系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">在线考试系统</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">欢迎, {{ session.username }} (教师)</span>
                <a class="btn btn-outline-light" href="{{ url_for('logout') }}">退出</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>创建考试</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label for="exam_name" class="form-label">考试名称</label>
                <input type="text" class="form-control" id="exam_name" name="exam_name" required>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="subject" class="form-label">科目</label>
                        <input type="text" class="form-control" id="subject" name="subject" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="duration_minutes" class="form-label">考试时长(分钟)</label>
                        <input type="number" class="form-control" id="duration_minutes" name="duration_minutes" value="60" min="1" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="start_time" class="form-label">开始时间 (可选)</label>
                        <input type="datetime-local" class="form-control" id="start_time" name="start_time">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="end_time" class="form-label">结束时间 (可选)</label>
                        <input type="datetime-local" class="form-control" id="end_time" name="end_time">
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="anti_cheat_enabled" name="anti_cheat_enabled">
                    <label class="form-check-label" for="anti_cheat_enabled">启用防作弊监控</label>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="shuffle_questions" name="shuffle_questions">
                    <label class="form-check-label" for="shuffle_questions">随机打乱题目顺序</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">选择题目</label>
                <div class="row">
                    {% for question in questions %}
                    <div class="col-md-6 col-lg-4 mb-2">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="questions" value="{{ question.id }}" id="question_{{ question.id }}">
                            <label class="form-check-label small" for="question_{{ question.id }}">
                                <strong>{{ loop.index }}.</strong>
                                {{ question.question_text[:50] }}...
                                <br>
                                <small class="text-muted">
                                    类型: {{ '单选' if question.question_type == 'multiple_choice' else
                                          '多选' if question.question_type == 'multiple_select' else
                                          '判断' if question.question_type == 'true_false' else
                                          '简答' if question.question_type == 'short_answer' else
                                          '编程' if question.question_type == 'programming' else question.question_type }},
                                    分值: {{ question.points }}
                                </small>
                            </label>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <button type="submit" class="btn btn-primary">创建考试</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">返回仪表板</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
